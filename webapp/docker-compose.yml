# =============================================================================
# GEKO Magazine Web App - Docker Compose
# =============================================================================
#
# Architettura:
#   - Backend: FastAPI (JSON API)
#   - Frontend: Svelte SPA (built durante docker build)
#   - Database: SQLite
#   - PDF: Typst
#
# Uso:
#   # Avvio (sviluppo - con .env file)
#   docker-compose up -d
#
#   # Avvio (produzione - con secrets)
#   docker-compose --profile production up -d
#
#   # Logs
#   docker-compose logs -f
#
#   # Stop
#   docker-compose down
#
#   # Rebuild dopo modifiche (ricompila anche frontend Svelte)
#   docker-compose up -d --build
#
# Gestione Secrets (3 opzioni):
#   1. File .env (sviluppo): ANTHROPIC_API_KEY=sk-...
#   2. File secrets (produzione): secrets/anthropic_key.txt
#   3. Variabile ambiente: ANTHROPIC_API_KEY=sk-... docker-compose up
#
# Volumi:
#   - ./data: database SQLite e file caricati (persistente)
#   - ../template.typ: template Typst (read-only)
#   - ../assets: immagini template (read-only)
#
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Web App principale
  # ---------------------------------------------------------------------------
  webapp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: geko-webapp
    restart: unless-stopped

    # Porte esposte
    ports:
      - "8000:8000"

    # Secrets (montati in /run/secrets/)
    secrets:
      - anthropic_key

    # Variabili ambiente
    environment:
      # API Key Claude - legge da file secrets se presente
      # Altrimenti fallback a variabile ambiente diretta
      - ANTHROPIC_API_KEY_FILE=/run/secrets/anthropic_key
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}

      # Ambiente (development/production)
      - ENVIRONMENT=${ENVIRONMENT:-production}

    # Volumi persistenti e shared
    volumes:
      # Database e file caricati (PERSISTENTE - non perdere!)
      - ./data:/app/data

      # Template Typst dalla directory parent (read-only)
      - ../template.typ:/app/typst/template.typ:ro

      # Assets (immagini, loghi) dalla directory parent (read-only)
      - ../assets:/app/typst/assets:ro

      # Directory output per PDF generati
      - ./data/output:/app/data/output

    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # Limiti risorse (opzionale, decommentare se necessario)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '1'
    #       memory: 512M

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    labels:
        - "traefik.enable=true"
        - "traefik.http.routers.geko-rtr.entrypoints=websecure"

        - "traefik.http.routers.geko-rtr.rule=Host(`geko.fabris.me`)"

        - "traefik.http.routers.geko-rtr.middlewares=chain-forwardAuth-authentik@file"
        - "traefik.http.routers.geko-rtr.service=geko-svc"
        - "traefik.http.services.geko-svc.loadbalancer.server.port=8000"

    networks:
      traefik:

  # ---------------------------------------------------------------------------
  # Server MCP standalone (OAuth 2.1 via Scalekit) — host dedicato tutto-MCP.
  # Stessa immagine della webapp, comando diverso; condivide il volume ./data
  # (DB SQLite). NIENTE Authentik: l'OAuth lo fa Scalekit dentro l'MCP.
  # ---------------------------------------------------------------------------
  geko-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: geko-mcp
    restart: unless-stopped
    command: ["python", "-m", "app.mcp.standalone"]
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - MCP_PORT=3003
      - SCALEKIT_ENVIRONMENT_URL=${SCALEKIT_ENVIRONMENT_URL:-}
      - SCALEKIT_RESOURCE_ID=${SCALEKIT_RESOURCE_ID:-}
      - MCP_PUBLIC_URL=${MCP_PUBLIC_URL:-https://geko-mcp.fabris.me/}
    volumes:
      - ./data:/app/data
    networks:
      - traefik
    # Override: l'healthcheck dell'immagine punta a :8000 (webapp), qui l'MCP
    # ascolta su :3003 (senza override → unhealthy → Traefik non instrada).
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import httpx; r=httpx.post('http://localhost:3003/mcp', headers={'Accept':'application/json, text/event-stream','Content-Type':'application/json'}, json={}); exit(0 if r.status_code in (400,401,406) else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.geko-mcp-rtr.rule=Host(`geko-mcp.fabris.me`)"
      - "traefik.http.routers.geko-mcp-rtr.entrypoints=websecure"
      - "traefik.http.routers.geko-mcp-rtr.service=geko-mcp-svc"
      - "traefik.http.services.geko-mcp-svc.loadbalancer.server.port=3003"
      - "traefik.http.services.geko-mcp-svc.loadbalancer.server.scheme=http"
# =============================================================================
# Definizione Secrets
# =============================================================================
# I secrets vengono letti da file locali e montati in /run/secrets/
# nel container. Più sicuro delle variabili ambiente.
#
# Setup:
#   mkdir -p secrets
#   echo "sk-ant-api03-xxxxx" > secrets/anthropic_key.txt
#   chmod 600 secrets/anthropic_key.txt
#
# =============================================================================
secrets:
  anthropic_key:
    file: ./secrets/anthropic_key.txt

# =============================================================================
# Note di deploy:
#
# 1. Authentik (reverse proxy):
#    Configura Authentik per proteggere l'accesso.
#    Esempio nginx upstream: proxy_pass http://localhost:8000;
#
# 2. Backup:
#    Il volume ./data contiene il database SQLite e i file caricati.
#    Eseguire backup regolari di questa directory.
#
# 3. HTTPS:
#    Usa un reverse proxy (nginx, traefik, caddy) per terminazione SSL.
#    L'app interna comunica solo HTTP sulla porta 8000.
#
# 4. Scaling:
#    Per maggiore performance, aumentare workers in CMD Dockerfile:
#    CMD ["uvicorn", "app.main:app", "--workers", "4", ...]
#
# =============================================================================
#
#

networks:
  traefik:
    external: true
    name: traefik
# Rete esterna condivisa con Traefik per routing e SSL

# =============================================================================
# GEKO Magazine - Docker Compose PRODUZIONE
# =============================================================================
#
# Usa l'immagine pre-buildata da GitHub Container Registry (GHCR).
# Non fa build locale - scarica l'immagine già pronta.
#
# Setup iniziale (una volta):
#   1. Crea secrets:
#      mkdir -p secrets
#      echo "sk-ant-api03-xxx" > secrets/anthropic_key.txt
#      chmod 600 secrets/anthropic_key.txt
#
#   2. Login a GHCR (se repo privato):
#      echo $GITHUB_TOKEN | docker login ghcr.io -u USERNAME --password-stdin
#
# Uso:
#   # Pull e avvio
#   docker-compose -f docker-compose.prod.yml pull
#   docker-compose -f docker-compose.prod.yml up -d
#
#   # Aggiornamento (dopo nuovo push su GitHub)
#   docker-compose -f docker-compose.prod.yml pull
#   docker-compose -f docker-compose.prod.yml up -d --force-recreate
#
# =============================================================================

services:
  webapp:
    # ===========================================
    # IMPORTANTE: Modifica con il tuo username!
    # ===========================================
    image: ghcr.io/iu3qez/geko-template/geko-webapp:latest

    container_name: geko-webapp
    restart: unless-stopped

    ports:
      - "8000:8000"

    secrets:
      - anthropic_key

    environment:
      - ANTHROPIC_API_KEY_FILE=/run/secrets/anthropic_key
      - ENVIRONMENT=production

    volumes:
      # Database e file caricati (PERSISTENTE)
      - ./data:/app/data

      # Template Typst (dalla directory parent)
      - ${PWD}/../template.typ:/app/typst/template.typ:ro
      - ${PWD}/../assets:/app/typst/assets:ro

    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
        - "traefik.enable=true"
        - "traefik.http.routers.geko-rtr.entrypoints=websecure"

        - "traefik.http.routers.geko-rtr.rule=Host(`geko.fabris.me`)"

        - "traefik.http.routers.geko-rtr.middlewares=chain-forwardAuth-authentik@file"
        - "traefik.http.routers.geko-rtr.service=geko-svc"
        - "traefik.http.services.geko-svc.loadbalancer.server.port=8000"

    networks:
      traefik:

  # ---------------------------------------------------------------------------
  # Server MCP standalone (OAuth 2.1 via Scalekit) — host dedicato tutto-MCP.
  # Stessa immagine della webapp, comando diverso; condivide il volume ./data
  # (DB SQLite) così i tool restano in-process. NIENTE Authentik: l'OAuth è
  # gestito da Scalekit dentro il server MCP (come MQC_Award).
  # ---------------------------------------------------------------------------
  geko-mcp:
    image: ghcr.io/iu3qez/geko-template/geko-webapp:latest
    container_name: geko-mcp
    restart: unless-stopped
    command: ["python", "-m", "app.mcp.standalone"]
    security_opt:
      - no-new-privileges:true
    environment:
      - ENVIRONMENT=production
      - MCP_PORT=3003
      - SCALEKIT_ENVIRONMENT_URL=${SCALEKIT_ENVIRONMENT_URL:-}
      - SCALEKIT_RESOURCE_ID=${SCALEKIT_RESOURCE_ID:-}
      - MCP_PUBLIC_URL=${MCP_PUBLIC_URL:-https://geko-mcp.fabris.me/}
      - GEKO_UPLOAD_SIGNING_KEY=${GEKO_UPLOAD_SIGNING_KEY:-}
    volumes:
      # DB SQLite condiviso con la webapp (tool in-process)
      - ./data:/app/data
    networks:
      - traefik
    # Override: l'healthcheck dell'immagine punta a :8000 (webapp), qui l'MCP
    # ascolta su :3003. Senza override il container resta unhealthy e Traefik
    # non lo instrada (404). Un POST senza token risponde 401 = server vivo.
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import httpx; r=httpx.post('http://localhost:3003/mcp', headers={'Accept':'application/json, text/event-stream','Content-Type':'application/json'}, json={}); exit(0 if r.status_code in (400,401,406) else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.geko-mcp-rtr.rule=Host(`geko-mcp.fabris.me`)"
      - "traefik.http.routers.geko-mcp-rtr.entrypoints=websecure"
      - "traefik.http.routers.geko-mcp-rtr.service=geko-mcp-svc"
      - "traefik.http.services.geko-mcp-svc.loadbalancer.server.port=3003"
      - "traefik.http.services.geko-mcp-svc.loadbalancer.server.scheme=http"
secrets:
  anthropic_key:
    file: ./secrets/anthropic_key.txt
networks:
  traefik:
    external: true
    name: traefik
# Rete esterna condivisa con Traefik per routing e SSL